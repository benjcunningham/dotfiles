name: build

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Lint
      run: bash scripts/test.sh

  install:
    strategy:
      matrix:
        runs-on:
        - macos-15-intel
        - macos-26
        - ubuntu-22.04
        - ubuntu-24.04
    runs-on: ${{ matrix.runs-on }}
    env:
      DEBIAN_FRONTEND: noninteractive
      DOTFILES_FRONTEND: noninteractive
    steps:
    - name: Download installer
      run: |
        echo "Installing from SHA ${{ github.sha }}"
        curl -fsSLO https://raw.githubusercontent.com/benjcunningham/dotfiles/${{ github.sha }}/install.sh
    - name: Run installer
      run: bash install.sh -pw

  version:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Check VERSION is a valid semver increment
      run: |
        BASE_VERSION=$(git show origin/${{ github.base_ref }}:VERSION | tr -d '[:space:]')
        PR_VERSION=$(cat VERSION | tr -d '[:space:]')

        # Validate both are semver (X.Y.Z)
        semver_regex='^[0-9]+\.[0-9]+\.[0-9]+$'
        if ! echo "$PR_VERSION" | grep -qE "$semver_regex"; then
          echo "::error::VERSION '$PR_VERSION' is not valid semver (expected X.Y.Z)"
          exit 1
        fi

        # Split into components
        BASE_MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
        BASE_MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
        BASE_PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
        PR_MAJOR=$(echo "$PR_VERSION" | cut -d. -f1)
        PR_MINOR=$(echo "$PR_VERSION" | cut -d. -f2)
        PR_PATCH=$(echo "$PR_VERSION" | cut -d. -f3)

        # Must be strictly greater than base
        if [ "$PR_MAJOR" -gt "$BASE_MAJOR" ]; then
          echo "Major bump: $BASE_VERSION -> $PR_VERSION"
        elif [ "$PR_MAJOR" -eq "$BASE_MAJOR" ] && [ "$PR_MINOR" -gt "$BASE_MINOR" ]; then
          echo "Minor bump: $BASE_VERSION -> $PR_VERSION"
        elif [ "$PR_MAJOR" -eq "$BASE_MAJOR" ] && [ "$PR_MINOR" -eq "$BASE_MINOR" ] && [ "$PR_PATCH" -gt "$BASE_PATCH" ]; then
          echo "Patch bump: $BASE_VERSION -> $PR_VERSION"
        else
          echo "::error::VERSION must be incremented. Base: $BASE_VERSION, PR: $PR_VERSION"
          exit 1
        fi

  release:
    if: github.event_name == 'push'
    needs: [lint, install]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Read version
      id: version
      run: echo "version=v$(cat VERSION)" >> "$GITHUB_OUTPUT"
    - name: Create release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        version="v$(cat VERSION)"
        if gh release view "$version" >/dev/null 2>&1; then
          echo "Release $version already exists, skipping"
        else
          gh release create "$version" --title "$version" --generate-notes
        fi

  docker:
    needs: [release]
    if: always() && !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    strategy:
      matrix:
        include:
        - image: ubuntu-22.04
        - image: ubuntu-24.04
        - image: debian-bookworm
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: benjcunningham/${{ matrix.image }}
        tags: |
          type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
          type=raw,value=${{ needs.release.outputs.version }},enable=${{ github.event_name != 'pull_request' && needs.release.outputs.version != '' }}
    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push to Docker Hub
      uses: docker/build-push-action@v7
      with:
        file: docker/${{ matrix.image }}/Dockerfile
        target: install
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
